<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elegant Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins'; }

/* REMOVE BLUE SELECTION */
::selection { background: transparent; }

/* BEAUTIFUL BACKGROUND */
body {
  height:100vh;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.3) 2px, transparent 3px),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.3) 2px, transparent 3px),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 2px, transparent 3px),
    linear-gradient(135deg, #ffd1dc, #ffe4ec);
  background-size: 100px 100px, 120px 120px, 80px 80px, cover;
}

/* LOGIN */
.center { display:flex; justify-content:center; align-items:center; height:100vh; }

.card {
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.card input {
  width:100%;
  padding:12px;
  margin:15px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

.card button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff7aa2;
  color:white;
  cursor:pointer;
}

/* APP */
.hidden { display:none; }
#app { display:flex; height:100vh; }

/* SIDEBAR */
.sidebar {
  width:260px;
  background:white;
  padding:15px;
  border-right:1px solid #eee;
}

#rooms li, #users li {
  list-style:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

#rooms li:hover {
  background:#ffe4ec;
}

#users li {
  user-select:none;
}

/* INPUT + BUTTON */
.sidebar input {
  width:100%;
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:10px;
}

.btn {
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff7aa2;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.03);
  box-shadow:0 5px 15px rgba(255,122,162,0.3);
}

.logout {
  background:#ff4d6d;
}

/* CHAT */
.chat {
  flex:1;
  display:flex;
  flex-direction:column;
  background:
    radial-gradient(circle, rgba(255,255,255,0.2) 1px, transparent 2px);
  background-size:40px 40px;
}

#messages {
  flex:1;
  overflow-y:auto;
  padding:20px;
}

/* BUBBLES */
.message {
  max-width:65%;
  padding:12px;
  margin:10px 0;
  border-radius:18px;
}

.me {
  background:#ff7aa2;
  color:white;
  margin-left:auto;
}

.other {
  background:white;
}

/* INPUT */
.input {
  display:flex;
  padding:10px;
  border-top:1px solid #eee;
  background:white;
}

.input input {
  flex:1;
  padding:12px;
  border-radius:20px;
  border:1px solid #ddd;
}

.input button {
  margin-left:10px;
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#ff7aa2;
  color:white;
  cursor:pointer;
}

/* TYPING */
.typing {
  font-size:12px;
  color:#888;
  margin-left:10px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

</head>
<body>

<div id="login" class="center">
  <div class="card">
    <h2>💗 Chat App</h2>
    <input id="username" placeholder="Enter username">
    <button onclick="joinApp()">Join Chat</button>
  </div>
</div>

<div id="app" class="hidden">

  <div class="sidebar">
    <h3>Rooms</h3>
    <ul id="rooms"></ul>

    <input id="newRoom" placeholder="New room">
    <button class="btn" onclick="createRoom()">Create Room</button>

    

    <button class="btn logout" onclick="logout()">Logout</button>
  </div>

  <div class="chat">
    <div id="messages"></div>
    <div class="typing" id="typing"></div>

    <div class="input">
      <input id="messageInput" placeholder="Type message..." oninput="setTyping(true)">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCOccHjx44rwiH148QvMsaFhbMe6tjSHk8",
  authDomain: "chatapp-77105.firebaseapp.com",
  databaseURL: "https://chatapp-77105-default-rtdb.firebaseio.com",
  projectId: "chatapp-77105"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = "";
let currentRoom = "general";

function joinApp() {
  username = document.getElementById("username").value;
  if (!username) return alert("Enter username");

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");

  db.ref("online/" + username).set(true);
  loadUsers();
  loadRooms();
}

function logout() {
  db.ref("online/" + username).remove();
  location.reload();
}

/* USERS */
function loadUsers() {
  db.ref("online").on("value", snap => {
    const users = snap.val() || {};
    const ul = document.getElementById("users");
    ul.innerHTML = "";

    Object.keys(users).forEach(u => {
      const li = document.createElement("li");
      li.innerText = u;
      ul.appendChild(li);
    });
  });
}

/* ROOMS */
function createRoom() {
  const room = document.getElementById("newRoom").value;
  if (!room) return;
  db.ref("rooms/" + room).set(true);
}

function loadRooms() {
  db.ref("rooms").on("value", snap => {
    const rooms = snap.val() || {};
    const ul = document.getElementById("rooms");
    ul.innerHTML = "";

    Object.keys(rooms).forEach(room => {
      const li = document.createElement("li");
      li.innerText = room;
      li.onclick = () => switchRoom(room);
      ul.appendChild(li);
    });
  });
}

function switchRoom(room) {
  currentRoom = room;
  document.getElementById("messages").innerHTML = "";

  db.ref("messages/" + room).off();
  db.ref("messages/" + room).on("child_added", snap => {
    showMessage(snap.val());
  });
}

/* TYPING */
function setTyping(status) {
  db.ref("typing/" + currentRoom + "/" + username).set(status);
}

db.ref("typing").on("value", snap => {
  const data = snap.val() || {};
  let text = "";

  Object.keys(data[currentRoom] || {}).forEach(u => {
    if (u !== username && data[currentRoom][u]) {
      text = u + " is typing...";
    }
  });

  document.getElementById("typing").innerText = text;
});

/* MESSAGE */
function sendMessage() {
  const msg = document.getElementById("messageInput").value;
  if (!msg) return;

  db.ref("messages/" + currentRoom).push({
    user: username,
    text: msg
  });

  setTyping(false);

  // AI reply
  if (msg.toLowerCase().includes("hello")) {
    setTimeout(() => {
      db.ref("messages/" + currentRoom).push({
        user: "AI 💗",
        text: "Hi " + username + " 😊"
      });
    }, 800);
  }

  document.getElementById("messageInput").value = "";
}

function showMessage(data) {
  const div = document.createElement("div");
  div.classList.add("message");

  if (data.user === username) div.classList.add("me");
  else div.classList.add("other");

  div.innerHTML = `<b>${data.user}</b><br>${data.text}`;
  document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
